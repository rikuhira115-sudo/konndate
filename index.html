<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>献立アキネーター</title>

<style>
/* ===============================
   カラーテーマ
=============================== */
:root {
  --green-main: #66BB6A;
  --green-light: #A5D6A7;
  --green-bg: #E8F5E9;
  --green-dark: #2E7D32;
  --text-main: #2E4D34;
}

/* ===============================
   背景の葉っぱアニメーション
=============================== */
body {
  font-family: "Hiragino Sans", "Rounded Mplus 1c", sans-serif;
  background: var(--green-bg);
  text-align: center;
  padding: 20px;
  margin: 0;
  color: var(--text-main);
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  top: -50px;
  left: -50px;
  width: 300px;
  height: 300px;
  background: url('https://i.imgur.com/8fK4V7H.png') no-repeat center/contain;
  opacity: 0.07;
  animation: leaf 12s infinite ease-in-out;
  pointer-events: none;
}

@keyframes leaf {
  0% { transform: rotate(0deg) translateY(0px); }
  50% { transform: rotate(6deg) translateY(10px); }
  100% { transform: rotate(0deg) translateY(0px); }
}

/* ===============================
   タイトル・トップボタン
=============================== */
h1 {
  color: var(--green-dark);
  margin-bottom: 10px;
  font-weight: 700;
}

.top-buttons {
  display: flex;
  justify-content: space-between;
  width: 90%;
  max-width: 450px;
  margin: 0 auto 15px;
}

.top-btn {
  background: var(--green-main);
  color: white;
  padding: 10px 18px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  text-decoration: none;
  border: none;
  cursor: pointer;
}

/* ===============================
   質問カード（フェードイン）
=============================== */
#question-card {
  background: #FFFFFF;
  padding: 25px;
  border-radius: 15px;
  width: 90%;
  max-width: 450px;
  margin: 0 auto 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

#question {
  font-size: 22px;
  margin-bottom: 20px;
}

/* ===============================
   選択肢ボタン（軽いフェードのみ）
=============================== */
.option-btn {
  padding: 14px;
  margin: 8px 0;
  font-size: 18px;
  cursor: pointer;
  width: 100%;
  border-radius: 12px;
  border: none;
  background: var(--green-light);
  color: var(--green-dark);
  transition: background 0.2s ease, color 0.2s ease;
  outline: none;
  touch-action: manipulation;
}

.option-btn:hover {
  background: var(--green-main);
  color: white;
}

/* ===============================
   ゲージ
=============================== */
#bar {
  width: 90%;
  height: 18px;
  background: #C8E6C9;
  margin: 20px auto;
  border-radius: 10px;
  overflow: hidden;
}

#bar-inner {
  height: 100%;
  width: 0%;
  background: var(--green-main);
  transition: width 0.4s ease;
}

/* ===============================
   戻るボタン
=============================== */
#back-btn {
  position: fixed;
  bottom: 15px;
  left: 15px;
  background: var(--green-main);
  color: white;
  border: none;
  padding: 12px 15px;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
}

/* ===============================
   結果カード（フェードイン）
=============================== */
.result-card {
  background: white;
  border-radius: 15px;
  padding: 20px;
  margin: 15px auto;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  animation: fadeIn 0.4s ease;
}

.result-card h3 {
  margin-top: 0;
  color: var(--green-dark);
}

.save-btn {
  margin-top: 10px;
  padding: 10px 20px;
  background: var(--green-main);
  color: white;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>献立アキネーター</h1>

<div class="top-buttons">
  <a href="favorites.html" class="top-btn">❤️ お気に入り</a>
  <button class="top-btn" onclick="resetAll()">🔄 最初から</button>
</div>

<div id="question-card">
  <div id="question"></div>
  <div id="options"></div>
</div>

<div id="bar"><div id="bar-inner"></div></div>

<button id="back-btn" onclick="goBack()">←</button>

<div id="result"></div>

<script>
/* ===============================
   質問セット（固定）
=============================== */
let questions = [
  {
    text: "主食は？",
    key: "主食",
    options: [
      { label: "ごはん", value: "米" },
      { label: "パン", value: "パン" },
      { label: "麺", value: "麺" },
      { label: "その他", value: "なし" }
    ]
  },
  {
    text: "ジャンルは？",
    key: "ジャンル",
    options: [
      { label: "和食", value: "和" },
      { label: "洋食", value: "洋" },
      { label: "中華", value: "中" },
      { label: "韓国", value: "韓" },
      { label: "エスニック", value: "エスニック" }
    ]
  },
  {
    text: "メイン食材は？",
    key: "食材タイプ",
    options: [
      { label: "肉料理", value: "肉" },
      { label: "肉以外", value: "非肉" }
    ]
  },
  {
    text: "どの肉がいい？",
    key: "肉の種類",
    condition: "肉",
    options: [
      { label: "牛肉", value: ["牛肉"] },
      { label: "豚肉", value: ["豚肉"] },
      { label: "鶏肉", value: ["鶏肉"] },
      { label: "ひき肉", value: ["ひき肉","合いびき肉"] }
    ]
  },
  {
    text: "肉以外の食材も選ぶ？",
    key: "肉以外の材料",
    options: [
      { label: "魚", value: ["鮭","白身魚","青魚","海老","イカ","タコ"] },
      { label: "野菜", value: ["野菜"] },
      { label: "豆腐", value: ["豆腐"] },
      { label: "卵", value: ["卵"] },
      { label: "特になし", value: [] }
    ]
  },
  {
    text: "味の傾向は？",
    key: "味の傾向",
    options: [
      { label: "こってり", value: "こってり" },
      { label: "あっさり", value: "あっさり" }
    ]
  },
  {
    text: "ボリュームは？",
    key: "ボリューム",
    options: [
      { label: "軽め", value: "軽い" },
      { label: "普通", value: "普通" },
      { label: "がっつり", value: "重い" }
    ]
  },
  {
    text: "調理時間は？",
    key: "調理時間(分)",
    options: [
      { label: "15分以内", value: 15 },
      { label: "30分以内", value: 30 },
      { label: "こだわらない", value: 999 }
    ]
  },
  {
    text: "いつ食べる？",
    key: "時間帯",
    options: [
      { label: "朝", value: "朝食" },
      { label: "昼", value: "昼食" },
      { label: "夜", value: "夕食" },
      { label: "夜食", value: "夜食" }
    ]
  }
];

let db = [];
let index = 0;
let answers = {};

/* ===============================
   JSON 読み込み
=============================== */
fetch("menu.json")
  .then(res => res.json())
  .then(data => {
    db = data;
    showQuestion();
  });

/* ===============================
   質問表示
=============================== */
function showQuestion() {
  const q = questions[index];

  // 条件付き質問（肉）
  if (q.condition) {
    if (answers["食材タイプ"] !== q.condition) {
      index++;
      showQuestion();
      return;
    }
  }

  document.getElementById("question").innerText = q.text;

  let html = "";
  q.options.forEach(opt => {
    html += `<button class="option-btn" onclick='selectAnswer(${JSON.stringify(opt.value)})'>${opt.label}</button>`;
  });

  document.getElementById("options").innerHTML = html;

  document.getElementById("bar-inner").style.width =
    ((index) / questions.length) * 100 + "%";
}

/* ===============================
   回答処理
=============================== */
function selectAnswer(value) {
  const q = questions[index];
  answers[q.key] = value;

  index++;

  if (index >= questions.length) finish();
  else showQuestion();
}

/* ===============================
   戻る
=============================== */
function goBack() {
  if (index === 0) return;

  index--;
  const q = questions[index];
  delete answers[q.key];

  showQuestion();
}

/* ===============================
   最初から
=============================== */
function resetAll() {
  index = 0;
  answers = {};
  showQuestion();
}

/* ===============================
   結果
=============================== */
function finish() {
  let filtered = [...db];

  let allMaterials = [];
  if (answers["肉の種類"]) allMaterials.push(...answers["肉の種類"]);
  if (answers["肉以外の材料"]) allMaterials.push(...answers["肉以外の材料"]);

  Object.keys(answers).forEach(key => {
    const value = answers[key];

    if (key === "肉の種類" || key === "肉以外の材料") return;

    if (key === "調理時間(分)") {
      filtered = filtered.filter(item => item["調理時間(分)"] <= value);
    } else if (key === "時間帯") {
      filtered = filtered.filter(item => item["時間帯"].includes(value));
    } else {
      filtered = filtered.filter(item => item[key] === value);
    }
  });

  if (allMaterials.length > 0) {
    filtered = filtered.filter(item =>
      item["主な材料"].some(mat => allMaterials.includes(mat))
    );
  }

  if (filtered.length === 0) filtered = db;

  const top3 = filtered.slice(0, 3);

  let html = "";
  top3.forEach(item => {
    const link = `https://cookpad.com/jp/search/${encodeURIComponent(item["メニュー名"])}`;

    html += `
      <div class="result-card">
        <h3>${item["メニュー名"]}</h3>
        <a href="${link}" target="_blank">レシピを見る</a><br>
        <button class="save-btn" onclick="saveMenu('${item["メニュー名"]}', '${link}')">お気に入りに追加</button>
      </div>
    `;
  });

  document.getElementById("question-card").style.display = "none";
  document.getElementById("bar").style.display = "none";
  document.getElementById("back-btn").style.display = "none";

  document.getElementById("result").innerHTML = html;
}

/* ===============================
   お気に入り保存
=============================== */
function saveMenu(name, link) {
  let saved = JSON.parse(localStorage.getItem("savedMenus") || "[]");

  if (!saved.some(item => item.name === name)) {
    saved.push({ name, link });
    localStorage.setItem("savedMenus", JSON.stringify(saved));
  }

  alert("お気に入りに追加しました！");
}
</script>

</body>
</html>
