<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>献立アキネーター</title>

<style>
body {
  font-family: "Hiragino Sans", "Rounded Mplus 1c", sans-serif;
  background: #E8F5E9; /* 優しい緑 */
  text-align: center;
  padding: 20px;
  margin: 0;
  color: #2E4D34;
}

h1 {
  color: #2E7D32;
  margin-bottom: 10px;
  font-weight: 700;
}

.fav-top-btn {
  display: inline-block;
  background: #66BB6A;
  color: white;
  padding: 12px 25px;
  border-radius: 25px;
  font-size: 16px;
  font-weight: bold;
  text-decoration: none;
  margin-bottom: 20px;
  box-shadow: 0 3px 6px rgba(0,0,0,0.15);
}

#question-card {
  background: #FFFFFF;
  padding: 25px;
  border-radius: 15px;
  width: 90%;
  max-width: 450px;
  margin: 0 auto 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

#question {
  font-size: 22px;
  margin-bottom: 20px;
}

.option-btn {
  padding: 14px;
  margin: 8px 0;
  font-size: 18px;
  cursor: pointer;
  width: 100%;
  border-radius: 12px;
  border: none;
  background: #A5D6A7;
  color: #1B5E20;
  box-shadow: 0 3px 6px rgba(0,0,0,0.15);
  transition: 0.2s;
}

.option-btn:hover {
  background: #81C784;
}

#bar {
  width: 90%;
  height: 18px;
  background: #C8E6C9;
  margin: 20px auto;
  border-radius: 10px;
  overflow: hidden;
}

#bar-inner {
  height: 100%;
  width: 0%;
  background: #66BB6A;
  transition: width 0.3s ease;
}

#back-btn {
  position: fixed;
  bottom: 15px;
  left: 15px;
  background: #81C784;
  color: white;
  border: none;
  padding: 12px 15px;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 3px 6px rgba(0,0,0,0.2);
}

#result {
  margin-top: 20px;
}

.result-card {
  background: white;
  border-radius: 15px;
  padding: 20px;
  margin: 15px auto;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.result-card h3 {
  margin-top: 0;
  color: #2E7D32;
}

.save-btn {
  margin-top: 10px;
  padding: 10px 20px;
  background: #66BB6A;
  color: white;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

@media (max-width: 480px) {
  #question { font-size: 20px; }
  .option-btn { font-size: 16px; padding: 12px; }
}
</style>
</head>
<body>

<h1>献立アキネーター</h1>
<a href="favorites.html" class="fav-top-btn">❤️ お気に入り</a>

<div id="question-card">
  <div id="question"></div>
  <div id="options"></div>
</div>

<div id="bar"><div id="bar-inner"></div></div>

<button id="back-btn" onclick="goBack()">←</button>

<div id="result"></div>

<script>
// ===============================
// 質問セット（選択式）
// ===============================
let questions = [
  {
    text: "主食は？",
    key: "主食",
    options: [
      { label: "ごはん", value: "米" },
      { label: "パン", value: "パン" },
      { label: "麺", value: "麺" },
      { label: "その他", value: "なし" }
    ]
  },
  {
    text: "ジャンルは？",
    key: "ジャンル",
    options: [
      { label: "和食", value: "和" },
      { label: "洋食", value: "洋" },
      { label: "中華", value: "中" },
      { label: "韓国", value: "韓" },
      { label: "エスニック", value: "エスニック" }
    ]
  },
  {
    text: "メイン食材は？",
    key: "食材タイプ",
    options: [
      { label: "肉料理", value: "肉" },
      { label: "肉以外", value: "非肉" }
    ]
  },
  {
    text: "どの肉がいい？",
    key: "主な材料",
    condition: "肉",
    options: [
      { label: "牛肉", value: ["牛肉"] },
      { label: "豚肉", value: ["豚肉"] },
      { label: "鶏肉", value: ["鶏肉"] },
      { label: "ひき肉", value: ["ひき肉","合いびき肉"] }
    ]
  },
  {
    text: "どれがいい？",
    key: "主な材料",
    condition: "非肉",
    options: [
      { label: "魚", value: ["鮭","白身魚","青魚","海老","イカ","タコ"] },
      { label: "野菜", value: ["野菜"] },
      { label: "豆腐", value: ["豆腐"] },
      { label: "卵", value: ["卵"] }
    ]
  },
  {
    text: "味の傾向は？",
    key: "味の傾向",
    options: [
      { label: "こってり", value: "こってり" },
      { label: "あっさり", value: "あっさり" }
    ]
  },
  {
    text: "ボリュームは？",
    key: "ボリューム",
    options: [
      { label: "軽め", value: "軽い" },
      { label: "普通", value: "普通" },
      { label: "がっつり", value: "重い" }
    ]
  },
  {
    text: "調理時間は？",
    key: "調理時間(分)",
    options: [
      { label: "15分以内", value: 15 },
      { label: "30分以内", value: 30 },
      { label: "こだわらない", value: 999 }
    ]
  },
  {
    text: "いつ食べる？",
    key: "時間帯",
    options: [
      { label: "朝", value: "朝食" },
      { label: "昼", value: "昼食" },
      { label: "夜", value: "夕食" },
      { label: "夜食", value: "夜食" }
    ]
  }
];

let db = [];
let index = 0;
let answers = [];

// ===============================
// JSON 読み込み
// ===============================
fetch("menu.json")
  .then(res => res.json())
  .then(data => {
    db = data;
    showQuestion();
  });

// ===============================
// 質問表示
// ===============================
function showQuestion() {
  const q = questions[index];

  // 条件付き質問（肉 or 非肉）
  if (q.condition) {
    const prev = answers.find(a => a.key === "食材タイプ");
    if (!prev || prev.value !== q.condition) {
      index++;
      showQuestion();
      return;
    }
  }

  document.getElementById("question").innerText = q.text;

  let html = "";
  q.options.forEach(opt => {
    html += `<button class="option-btn" onclick='selectAnswer(${JSON.stringify(opt.value)})'>${opt.label}</button>`;
  });

  document.getElementById("options").innerHTML = html;

  document.getElementById("bar-inner").style.width =
    ((index) / questions.length) * 100 + "%";
}

// ===============================
// 回答処理
// ===============================
function selectAnswer(value) {
  const q = questions[index];
  answers.push({ key: q.key, value });

  index++;

  if (index >= questions.length) finish();
  else showQuestion();
}

// ===============================
// 戻るボタン
// ===============================
function goBack() {
  if (index === 0) return;

  index--;
  answers.pop();
  showQuestion();
}

// ===============================
// 結果計算
// ===============================
function finish() {
  let filtered = [...db];

  answers.forEach(a => {
    if (a.key === "主な材料") {
      filtered = filtered.filter(item =>
        item["主な材料"].some(mat => a.value.includes(mat))
      );
    } else if (a.key === "調理時間(分)") {
      filtered = filtered.filter(item => item["調理時間(分)"] <= a.value);
    } else if (a.key === "時間帯") {
      filtered = filtered.filter(item => item["時間帯"].includes(a.value));
    } else {
      filtered = filtered.filter(item => item[a.key] === a.value);
    }
  });

  if (filtered.length === 0) filtered = db;

  const top3 = filtered.slice(0, 3);

  let html = "";
  top3.forEach(item => {
    const link = `https://cookpad.com/jp/search/${encodeURIComponent(item["メニュー名"])}`;

    html += `
      <div class="result-card">
        <h3>${item["メニュー名"]}</h3>
        <a href="${link}" target="_blank">レシピを見る</a><br>
        <button class="save-btn" onclick="saveMenu('${item["メニュー名"]}', '${link}')">お気に入りに追加</button>
      </div>
    `;
  });

  document.getElementById("question-card").style.display = "none";
  document.getElementById("bar").style.display = "none";
  document.getElementById("back-btn").style.display = "none";

  document.getElementById("result").innerHTML = html;
}

// ===============================
// お気に入り保存
// ===============================
function saveMenu(name, link) {
  let saved = JSON.parse(localStorage.getItem("savedMenus") || "[]");

  if (!saved.some(item => item.name === name)) {
    saved.push({ name, link });
    localStorage.setItem("savedMenus", JSON.stringify(saved));
  }

  alert("お気に入りに追加しました！");
}
</script>

</body>
</html>
