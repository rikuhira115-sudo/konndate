<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>献立アキネーター</title>

<style>
body {
  font-family: "Hiragino Sans", "Rounded Mplus 1c", sans-serif;
  background: #FFF8F0;
  text-align: center;
  padding: 20px;
  margin: 0;
  color: #444;
}

h1 {
  color: #FF8FA3;
  margin-bottom: 10px;
}

.fav-link {
  display: inline-block;
  margin-bottom: 20px;
  color: #FF8FA3;
  font-weight: bold;
  text-decoration: none;
}

#question {
  font-size: 22px;
  margin: 30px 0;
  min-height: 80px;
}

.btn {
  padding: 14px 25px;
  margin: 8px;
  font-size: 18px;
  cursor: pointer;
  width: 90%;
  max-width: 300px;
  border-radius: 25px;
  border: none;
  background: #FFB6C1;
  color: white;
  box-shadow: 0 3px 6px rgba(0,0,0,0.15);
}

#buttons {
  display: flex;
  flex-direction: column;
  align-items: center;
}

#bar {
  width: 90%;
  height: 18px;
  background: #F2DCDC;
  margin: 20px auto;
  border-radius: 10px;
  overflow: hidden;
}

#bar-inner {
  height: 100%;
  width: 0%;
  background: #A7C7E7;
  transition: 0.3s;
}

.result-card {
  background: white;
  border-radius: 15px;
  padding: 20px;
  margin: 15px auto;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.result-card h3 {
  margin-top: 0;
  color: #FF8FA3;
}

.save-btn {
  margin-top: 10px;
  padding: 10px 20px;
  background: #FF8FA3;
  color: white;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

#result {
  padding-bottom: 160px;
}

#restart {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 300px;
  padding: 14px;
  font-size: 18px;
  border-radius: 25px;
  background: #FF8FA3;
  color: white;
  cursor: pointer;
  border: none;
  box-shadow: 0 3px 6px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<h1>献立アキネーター</h1>

<a href="favorites.html" class="fav-link">お気に入りを見る</a>

<div id="question"></div>

<div id="buttons">
  <button class="btn" onclick="answer(2)">はい</button>
  <button class="btn" onclick="answer(1)">ややそう</button>
  <button class="btn" onclick="answer(0)">どちらでもない</button>
  <button class="btn" onclick="answer(-1)">あまりそうでない</button>
  <button class="btn" onclick="answer(-2)">いいえ</button>
</div>

<div id="bar"><div id="bar-inner"></div></div>

<div id="result"></div>

<button id="restart" onclick="restartGame()">最初からやり直す</button>

<script>
// ===============================
// 質問セット（フィルター＋スコア）
// ===============================
let questions = [
  { text: "朝食向けの料理がいい？", key: "朝食", filter: "scene", sceneOrder: 1 },
  { text: "昼食向けの料理がいい？", key: "昼食", filter: "scene", sceneOrder: 2 },
  { text: "夕食向けの料理がいい？", key: "夕食", filter: "scene", sceneOrder: 3 },
  { text: "夜食向けの軽い料理がいい？", key: "Q_夜食", filter: "scene", sceneOrder: 4 },

  { text: "ご飯ものが食べたい？", key: "Q_米", branch: "rice", filter: "main" },
  { text: "麺類が食べたい？", key: "Q_麺", branch: "noodle", filter: "main" },
  { text: "パン系の料理が食べたい？", key: "Q_パン", branch: "bread", filter: "main" },

  { text: "15分以内で作れる料理がいい？", key: "Q_超短時間", filter: "time" },

  { text: "ちょっと高めの料理でもOK？", key: "高予算", filter: "budget" },

  { text: "肉料理が食べたい？", key: "Q_肉" },
  { text: "魚料理が食べたい？", key: "Q_魚" },
  { text: "卵を使った料理が食べたい？", key: "Q_卵" },
  { text: "野菜多めの料理がいい？", key: "Q_野菜" },

  { text: "こってりした料理が食べたい？", key: "Q_こってり" },
  { text: "あっさりした料理が食べたい？", key: "Q_あっさり" },
  { text: "塩味の料理が好き？", key: "Q_塩味" },
  { text: "クリーミーな料理が好き？", key: "Q_クリーミー" },
  { text: "スパイシーな料理が好き？", key: "Q_スパイシー" },

  { text: "揚げ物が食べたい？", key: "Q_揚げる" },
  { text: "焼き料理が食べたい？", key: "Q_焼く" },
  { text: "煮込み料理が食べたい？", key: "Q_煮る" },
  { text: "炒め物が食べたい？", key: "Q_炒める" },
  { text: "和え物が食べたい？", key: "Q_和える" }
];

const originalQuestions = JSON.parse(JSON.stringify(questions));

let db = [];
let filteredDB = [];
let index = 0;
let answers = [];

// ===============================
// JSON 読み込み
// ===============================
fetch("menu_fixed2.json")
  .then(res => res.json())
  .then(data => {
    db = data;
    filteredDB = [...db];
    showQuestion();
  });

function showQuestion() {
  document.getElementById("question").innerText = questions[index].text;
  document.getElementById("bar-inner").style.width = (index / questions.length) * 100 + "%";
}

function answer(value) {
  const q = questions[index];
  answers.push({ key: q.key, value });

  if (q.filter === "scene" && value > 0) {
    questions = questions.filter(qq => qq.filter !== "scene" || qq.sceneOrder <= q.sceneOrder);
    filteredDB = filteredDB.filter(item => item[q.key] === true);
  }

  if (q.filter === "main" && value > 0) {
    filteredDB = filteredDB.filter(item => item[q.key] === true);
    questions = questions.filter(qq => qq.filter !== "main" || qq.key === q.key);
  }

  if (q.filter === "time" && value > 0) {
    filteredDB = filteredDB.filter(item => item["調理時間(分)"] <= 15);
  }

  if (q.filter === "budget" && value < 0) {
    filteredDB = filteredDB.filter(item => item["高予算"] !== true);
  }

  index++;

  if (index >= questions.length) {
    finish();
  } else {
    showQuestion();
  }
}

function calcScores(data) {
  data.forEach(item => {
    item.score = 0;
    answers.forEach(a => {
      if (item[a.key] === true) item.score += a.value;
    });
  });
  return data.sort((a, b) => b.score - a.score);
}

function saveMenu(name) {
  let saved = JSON.parse(localStorage.getItem("savedMenus") || "[]");
  if (!saved.includes(name)) {
    saved.push(name);
    localStorage.setItem("savedMenus", JSON.stringify(saved));
  }
  alert("お気に入りに追加したよ！");
}

function finish() {
  document.getElementById("buttons").style.display = "none";
  document.getElementById("question").innerText = "あなたに合いそうな献立はこちら！";

  let result = filteredDB.length > 0 ? filteredDB : [];

  if (result.length === 0) {
    document.getElementById("result").innerHTML = `
      <div class="result-card">
        <h3>ごめんね…</h3>
        <p>条件に合う献立が見つからなかったよ💦</p>
        <p>質問を少し変えてもう一度試してみてね！</p>
      </div>
    `;
    return;
  }

  const top3 = calcScores(result).slice(0, 3);

  let html = "";
  top3.forEach(item => {
    html += `
      <div class="result-card">
        <h3>${item["メニュー名"]}</h3>
        <a href="${item["Cookpadリンク"]}" target="_blank">レシピを見る</a><br>
        <button class="save-btn" onclick="saveMenu('${item["メニュー名"]}')">お気に入りに追加</button>
      </div>
    `;
  });

  document.getElementById("result").innerHTML = html;
}

function restartGame() {
  index = 0;
  answers = [];
  questions = JSON.parse(JSON.stringify(originalQuestions));
  filteredDB = [...db];

  document.getElementById("buttons").style.display = "flex";
  document.getElementById("result").innerHTML = "";
  document.getElementById("bar-inner").style.width = "0%";

  showQuestion();
}
</script>

</body>
</html>
