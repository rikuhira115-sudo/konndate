<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>献立アキネーター</title>

<style>
:root {
  --green-main: #66BB6A;
  --green-light: #A5D6A7;
  --green-bg: #E8F5E9;
  --green-dark: #2E7D32;
  --text-main: #2E4D34;
}

body {
  font-family: "Hiragino Sans", "Rounded Mplus 1c", sans-serif;
  background: var(--green-bg);
  text-align: center;
  padding: 20px;
  margin: 0;
  color: var(--text-main);
}

h1 {
  color: var(--green-dark);
  margin-bottom: 10px;
  font-weight: 700;
}

.top-buttons {
  display: flex;
  justify-content: space-between;
  width: 90%;
  max-width: 450px;
  margin: 0 auto 15px;
}

.top-btn {
  background: var(--green-main);
  color: white;
  padding: 10px 18px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  text-decoration: none;
  border: none;
  cursor: pointer;
}

#question-card {
  background: #FFFFFF;
  padding: 25px;
  border-radius: 15px;
  width: 90%;
  max-width: 450px;
  margin: 0 auto 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

#question {
  font-size: 22px;
  margin-bottom: 20px;
}

.option-btn {
  padding: 14px;
  margin: 8px 0;
  font-size: 18px;
  cursor: pointer;
  width: 100%;
  border-radius: 12px;
  border: none;
  background: var(--green-light);
  color: var(--green-dark);
  transition: 0.2s;
}

.option-btn:hover {
  background: var(--green-main);
  color: white;
}

#bar {
  width: 90%;
  height: 18px;
  background: #C8E6C9;
  margin: 20px auto;
  border-radius: 10px;
  overflow: hidden;
}

#bar-inner {
  height: 100%;
  width: 0%;
  background: var(--green-main);
  transition: width 0.3s ease;
}

#back-btn {
  position: fixed;
  bottom: 15px;
  left: 15px;
  background: var(--green-main);
  color: white;
  border: none;
  padding: 12px 15px;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
}

.result-card {
  background: white;
  border-radius: 15px;
  padding: 20px;
  margin: 15px auto;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.result-card h3 {
  margin-top: 0;
  color: var(--green-dark);
}

.save-btn {
  margin-top: 10px;
  padding: 10px 20px;
  background: var(--green-main);
  color: white;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>献立アキネーター</h1>

<div class="top-buttons">
  <a href="favorites.html" class="top-btn">❤️ お気に入り</a>
  <button class="top-btn" onclick="resetAll()">🔄 最初から</button>
</div>

<div id="question-card">
  <div id="question"></div>
  <div id="options"></div>
</div>

<div id="bar"><div id="bar-inner"></div></div>

<button id="back-btn" onclick="goBack()">←</button>

<div id="result"></div>

<script>
// ===============================
// 動的質問リスト
// ===============================
let baseQuestions = [
  {
    text: "主食は？",
    key: "主食",
    options: [
      { label: "ごはん", value: "米" },
      { label: "パン", value: "パン" },
      { label: "麺", value: "麺" },
      { label: "その他", value: "なし" }
    ]
  },
  {
    text: "ジャンルは？",
    key: "ジャンル",
    options: [
      { label: "和食", value: "和" },
      { label: "洋食", value: "洋" },
      { label: "中華", value: "中" },
      { label: "韓国", value: "韓" },
      { label: "エスニック", value: "エスニック" }
    ]
  },
  {
    text: "メイン食材は？",
    key: "食材タイプ",
    options: [
      { label: "肉料理", value: "肉" },
      { label: "肉以外", value: "非肉" }
    ]
  }
];

let meatQuestion = {
  text: "どの肉がいい？",
  key: "肉の種類",
  options: [
    { label: "牛肉", value: ["牛肉"] },
    { label: "豚肉", value: ["豚肉"] },
    { label: "鶏肉", value: ["鶏肉"] },
    { label: "ひき肉", value: ["ひき肉","合いびき肉"] }
  ]
};

let nonMeatQuestion = {
  text: "肉以外の食材も選ぶ？",
  key: "肉以外の材料",
  options: [
    { label: "魚", value: ["鮭","白身魚","青魚","海老","イカ","タコ"] },
    { label: "野菜", value: ["野菜"] },
    { label: "豆腐", value: ["豆腐"] },
    { label: "卵", value: ["卵"] },
    { label: "特になし", value: [] }
  ]
};

let tailQuestions = [
  {
    text: "味の傾向は？",
    key: "味の傾向",
    options: [
      { label: "こってり", value: "こってり" },
      { label: "あっさり", value: "あっさり" }
    ]
  },
  {
    text: "ボリュームは？",
    key: "ボリューム",
    options: [
      { label: "軽め", value: "軽い" },
      { label: "普通", value: "普通" },
      { label: "がっつり", value: "重い" }
    ]
  },
  {
    text: "調理時間は？",
    key: "調理時間(分)",
    options: [
      { label: "15分以内", value: 15 },
      { label: "30分以内", value: 30 },
      { label: "こだわらない", value: 999 }
    ]
  },
  {
    text: "いつ食べる？",
    key: "時間帯",
    options: [
      { label: "朝", value: "朝食" },
      { label: "昼", value: "昼食" },
      { label: "夜", value: "夕食" },
      { label: "夜食", value: "夜食" }
    ]
  }
];

// ===============================
// 状態
// ===============================
let questions = [];
let answers = {};
let index = 0;
let db = [];

// ===============================
// 状態保存
// ===============================
function saveState() {
  localStorage.setItem("akinatorState", JSON.stringify({
    index,
    answers,
    questions
  }));
}

function loadState() {
  const saved = localStorage.getItem("akinatorState");
  if (!saved) return false;

  const state = JSON.parse(saved);
  index = state.index;
  answers = state.answers;
  questions = state.questions;
  return true;
}

// ===============================
// 初期化
// ===============================
function initQuestions() {
  questions = [...baseQuestions];
}

function resetAll() {
  index = 0;
  answers = {};
  initQuestions();
  localStorage.removeItem("akinatorState");
  showQuestion();
}

// ===============================
// JSON 読み込み
// ===============================
fetch("menu.json")
  .then(res => res.json())
  .then(data => {
    db = data;

    if (!loadState()) {
      initQuestions();
    }

    showQuestion();
  });

// ===============================
// 質問表示
// ===============================
function showQuestion() {
  const q = questions[index];

  document.getElementById("question").innerText = q.text;

  let html = "";
  q.options.forEach(opt => {
    html += `<button class="option-btn" onclick='selectAnswer(${JSON.stringify(opt.value)})'>${opt.label}</button>`;
  });

  document.getElementById("options").innerHTML = html;

  document.getElementById("bar-inner").style.width =
    ((index) / questions.length) * 100 + "%";

  saveState();
}

// ===============================
// 回答処理
// ===============================
function selectAnswer(value) {
  const q = questions[index];
  answers[q.key] = value;

  // 肉料理を選んだら肉の種類質問を追加
  if (q.key === "食材タイプ" && value === "肉") {
    questions.splice(index + 1, 0, meatQuestion);
  }

  // 肉料理でも肉以外でも必ず追加質問を入れる
  if (q.key === "食材タイプ") {
    questions.splice(index + 2, 0, nonMeatQuestion);
    questions = [...questions, ...tailQuestions];
  }

  index++;

  if (index >= questions.length) finish();
  else showQuestion();
}

// ===============================
// 戻る
// ===============================
function goBack() {
  if (index === 0) return;

  index--;
  const q = questions[index];
  delete answers[q.key];

  showQuestion();
}

// ===============================
// 結果
// ===============================
function finish() {
  let filtered = [...db];

  // 主な材料（肉 + 肉以外）を統合
  let allMaterials = [];
  if (answers["肉の種類"]) allMaterials.push(...answers["肉の種類"]);
  if (answers["肉以外の材料"]) allMaterials.push(...answers["肉以外の材料"]);

  Object.keys(answers).forEach(key => {
    const value = answers[key];

    if (key === "肉の種類" || key === "肉以外の材料") return;

    if (key === "調理時間(分)") {
      filtered = filtered.filter(item => item["調理時間(分)"] <= value);
    } else if (key === "時間帯") {
      filtered = filtered.filter(item => item["時間帯"].includes(value));
    } else {
      filtered = filtered.filter(item => item[key] === value);
    }
  });

  if (allMaterials.length > 0) {
    filtered = filtered.filter(item =>
      item["主な材料"].some(mat => allMaterials.includes(mat))
    );
  }

  if (filtered.length === 0) filtered = db;

  const top3 = filtered.slice(0, 3);

  let html = "";
  top3.forEach(item => {
    const link = `https://cookpad.com/jp/search/${encodeURIComponent(item["メニュー名"])}`;

    html += `
      <div class="result-card">
        <h3>${item["メニュー名"]}</h3>
        <a href="${link}" target="_blank">レシピを見る</a><br>
        <button class="save-btn" onclick="saveMenu('${item["メニュー名"]}', '${link}')">お気に入りに追加</button>
      </div>
    `;
  });

  document.getElementById("question-card").style.display = "none";
  document.getElementById("bar").style.display = "none";
  document.getElementById("back-btn").style.display = "none";

  document.getElementById("result").innerHTML = html;

  localStorage.removeItem("akinatorState");
}

// ===============================
// お気に入り保存
// ===============================
function saveMenu(name, link) {
  let saved = JSON.parse(localStorage.getItem("savedMenus") || "[]");

  if (!saved.some(item => item.name === name)) {
    saved.push({ name, link });
    localStorage.setItem("savedMenus", JSON.stringify(saved));
  }

  alert("お気に入りに追加しました！");
}
</script>

</body>
</html>
