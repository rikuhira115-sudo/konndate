<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>献立アキネーター</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 20px;
  margin: 0;
}

#question {
  font-size: 22px;
  margin: 40px 0;
  min-height: 80px;
}

.btn {
  padding: 14px 25px;
  margin: 8px;
  font-size: 18px;
  cursor: pointer;
  width: 90%;
  max-width: 300px;
  border-radius: 8px;
}

#buttons {
  display: flex;
  flex-direction: column;
  align-items: center;
}

#bar {
  width: 90%;
  height: 18px;
  background: #ddd;
  margin: 20px auto;
  border-radius: 10px;
  overflow: hidden;
}

#bar-inner {
  height: 100%;
  width: 0%;
  background: #66c;
  transition: 0.3s;
}

.result-card {
  border: 1px solid #ccc;
  padding: 15px;
  margin: 15px auto;
  width: 90%;
  max-width: 400px;
  border-radius: 8px;
  background: #fafafa;
}

#restart {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 300px;
  padding: 14px;
  font-size: 18px;
  border-radius: 8px;
  background: #444;
  color: white;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>献立アキネーター</h1>

<div id="question"></div>

<div id="buttons">
  <button class="btn" onclick="answer(2)">はい</button>
  <button class="btn" onclick="answer(1)">ややそう</button>
  <button class="btn" onclick="answer(0)">どちらでもない</button>
  <button class="btn" onclick="answer(-1)">あまりそうでない</button>
  <button class="btn" onclick="answer(-2)">いいえ</button>
</div>

<div id="bar"><div id="bar-inner"></div></div>

<div id="result"></div>

<button id="restart" onclick="restartGame()">最初からやり直す</button>

<script>
// ===============================
// 質問セット（元の言い回し）
// ===============================
let questions = [
  { text: "朝食向けの料理を食べたい気分？", key: "朝食" },
  { text: "夕食向けの料理を食べたい気分？", key: "夕食" },
  { text: "夜食向けの軽い料理がいい？", key: "Q_夜食" },

  { text: "ご飯ものを食べたい気分？", key: "Q_米", branch: "rice" },
  { text: "麺類を食べたい気分？", key: "Q_麺", branch: "noodle" },
  { text: "パン系の料理を食べたい気分？", key: "Q_パン", branch: "bread" },

  { text: "肉料理を食べたい気分？", key: "Q_肉" },
  { text: "魚料理を食べたい気分？", key: "Q_魚" },
  { text: "卵を使った料理を食べたい気分？", key: "Q_卵" },
  { text: "野菜多めの料理を食べたい気分？", key: "Q_野菜" },
  { text: "海老を使った料理を食べたい気分？", key: "Q_海老" },

  { text: "こってりした料理を食べたい気分？", key: "Q_こってり" },
  { text: "あっさりした料理を食べたい気分？", key: "Q_あっさり" },

  { text: "揚げ物を食べたい気分？", key: "Q_揚げる" },
  { text: "焼き料理を食べたい気分？", key: "Q_焼く" },
  { text: "煮込み料理を食べたい気分？", key: "Q_煮る" },
  { text: "炒め物を食べたい気分？", key: "Q_炒める" },
  { text: "和え物を食べたい気分？", key: "Q_和える" },

  { text: "クリーミーな料理を食べたい気分？", key: "Q_クリーミー" },

  { text: "10分以内で作れる料理がいい？", key: "Q_超短時間" }
];

// リセット用コピー
const originalQuestions = JSON.parse(JSON.stringify(questions));

let db = [];
let index = 0;
let answers = [];

// ===============================
// JSON 読み込み（GitHub Pages で動く）
// ===============================
fetch("menu_fixed2.json")
  .then(res => res.json())
  .then(data => {
    db = data;
    showQuestion();
  })
  .catch(err => {
    document.getElementById("question").innerText = "JSON の読み込みに失敗しました";
    console.error(err);
  });

function showQuestion() {
  document.getElementById("question").innerText = questions[index].text;
  document.getElementById("bar-inner").style.width = (index / questions.length) * 100 + "%";
}

function answer(value) {
  const q = questions[index];
  answers.push({ key: q.key, value });

  // 主食の分岐
  if (q.branch === "rice" && value > 0) {
    questions = questions.filter(q => q.branch !== "noodle" && q.branch !== "bread");
  }
  if (q.branch === "noodle" && value > 0) {
    questions = questions.filter(q => q.branch !== "bread");
  }

  // こってり・あっさりの相互スキップ
  if (q.key === "Q_こってり" && value >= 1) {
    questions = questions.filter(qq => qq.key !== "Q_あっさり");
  }
  if (q.key === "Q_あっさり" && value >= 1) {
    questions = questions.filter(qq => qq.key !== "Q_こってり");
  }

  index++;

  // 途中終了（差が4以上）
  if (index >= 5) {
    const top = calcScores().slice(0, 2);
    if (top.length >= 2 && Math.abs(top[0].score - top[1].score) >= 4) {
      finish();
      return;
    }
  }

  if (index >= questions.length) {
    finish();
  } else {
    showQuestion();
  }
}

function calcScores() {
  db.forEach(item => {
    item.score = 0;
    answers.forEach(a => {
      if (item[a.key] === true) item.score += a.value;
    });
  });
  return db.sort((a, b) => b.score - a.score);
}

function finish() {
  document.getElementById("buttons").style.display = "none";
  document.getElementById("question").innerText = "あなたに合いそうな献立はこちら！";

  const top3 = calcScores().slice(0, 3);

  let html = "";
  top3.forEach(item => {
    html += `
      <div class="result-card">
        <h3>${item["メニュー名"]}</h3>
        <p>スコア：${Math.round(item.score)}</p>
        <a href="${item["Cookpadリンク"]}" target="_blank">レシピを見る</a>
      </div>
    `;
  });

  document.getElementById("result").innerHTML = html;
}

function restartGame() {
  index = 0;
  answers = [];
  questions = JSON.parse(JSON.stringify(originalQuestions));

  document.getElementById("buttons").style.display = "flex";
  document.getElementById("result").innerHTML = "";
  document.getElementById("bar-inner").style.width = "0%";

  showQuestion();
}
</script>

</body>
</html>
