<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>献立アキネーター</title>
<style>
body { font-family: sans-serif; text-align: center; padding: 20px; }
#question { font-size: 24px; margin: 40px 0; min-height: 80px; }
.btn { padding: 12px 25px; margin: 10px; font-size: 18px; cursor: pointer; }
#bar { width: 80%; height: 20px; background: #ddd; margin: 20px auto; border-radius: 10px; overflow: hidden; }
#bar-inner { height: 100%; width: 0%; background: #66c; transition: 0.3s; }
.result-card { border: 1px solid #ccc; padding: 15px; margin: 15px auto; width: 70%; border-radius: 8px; }
</style>
</head>
<body>

<h1>献立アキネーター</h1>

<div id="question"></div>

<div id="buttons">
  <button class="btn" onclick="answer(2)">はい</button>
  <button class="btn" onclick="answer(1)">ややそう</button>
  <button class="btn" onclick="answer(0)">どちらでもない</button>
  <button class="btn" onclick="answer(-1)">あまりそうでない</button>
  <button class="btn" onclick="answer(-2)">いいえ</button>
</div>

<div id="bar"><div id="bar-inner"></div></div>

<div id="result"></div>

<button id="restart" class="btn" style="display:none;" onclick="restartGame()">
  最初からやり直す
</button>

<script>
// ===============================
// 質問セット（面白い言い回し版）
// ===============================
let questions = [
  { text: "今日は朝っぽい軽めの料理、欲してる？", key: "朝食" },
  { text: "がっつり夕飯系の気分だったりする？", key: "夕食" },
  { text: "夜中にサクッと食べられるやつ、求めてる？", key: "Q_夜食" },

  { text: "白米ドーン系、今の気分に刺さる？", key: "Q_米", branch: "rice" },
  { text: "麺をズルッといきたい気分？", key: "Q_麺", branch: "noodle" },
  { text: "パン系の料理、今日はアリ？", key: "Q_パン", branch: "bread" },

  { text: "肉のパワーで満たされたい感じ？", key: "Q_肉" },
  { text: "魚のさっぱり感、求めてる？", key: "Q_魚" },
  { text: "卵のふわとろ感、欲しい？", key: "Q_卵" },
  { text: "野菜多めでヘルシーにいきたい気分？", key: "Q_野菜" },
  { text: "海老のプリッと感、今日はアリ？", key: "Q_海老" },

  { text: "こってり濃厚なやつ、いきたい？", key: "Q_こってり" },
  { text: "逆に、あっさり軽めがしっくりくる？", key: "Q_あっさり" },

  { text: "揚げ物のサクッと感、欲してる？", key: "Q_揚げる" },
  { text: "焼き料理の香ばしさ、今の気分に合う？", key: "Q_焼く" },
  { text: "煮込み系のホッとする感じ、求めてる？", key: "Q_煮る" },
  { text: "炒め物のジャッとした感じ、好き？", key: "Q_炒める" },
  { text: "和え物のサッと食べられる感じ、どう？", key: "Q_和える" },

  { text: "クリーミーなまろやか系、今日は気分？", key: "Q_クリーミー" },

  { text: "10分以内で作れる超スピード飯がいい？", key: "Q_超短時間" }
];

// リセット用コピー
const originalQuestions = JSON.parse(JSON.stringify(questions));

let db = [];
let index = 0;
let answers = [];

// ===============================
// JSON 読み込み（GitHub Pages で動く）
// ===============================
fetch("menu_fixed2.json")
  .then(res => res.json())
  .then(data => {
    db = data;
    showQuestion();
  })
  .catch(err => {
    document.getElementById("question").innerText = "JSON の読み込みに失敗しました";
    console.error(err);
  });

function showQuestion() {
  document.getElementById("question").innerText = questions[index].text;
  document.getElementById("bar-inner").style.width = (index / questions.length) * 100 + "%";
}

function answer(value) {
  const q = questions[index];
  answers.push({ key: q.key, value });

  // 主食の分岐
  if (q.branch === "rice" && value > 0) {
    questions = questions.filter(q => q.branch !== "noodle" && q.branch !== "bread");
  }
  if (q.branch === "noodle" && value > 0) {
    questions = questions.filter(q => q.branch !== "bread");
  }

  // こってり・あっさりの相互スキップ
  if (q.key === "Q_こってり" && value >= 1) {
    questions = questions.filter(qq => qq.key !== "Q_あっさり");
  }
  if (q.key === "Q_あっさり" && value >= 1) {
    questions = questions.filter(qq => qq.key !== "Q_こってり");
  }

  index++;

  // 途中終了（差が4以上）
  if (index >= 5) {
    const top = calcScores().slice(0, 2);
    if (top.length >= 2 && Math.abs(top[0].score - top[1].score) >= 4) {
      finish();
      return;
    }
  }

  if (index >= questions.length) {
    finish();
  } else {
    showQuestion();
  }
}

function calcScores() {
  db.forEach(item => {
    item.score = 0;
    answers.forEach(a => {
      if (item[a.key] === true) item.score += a.value;
    });
  });
  return db.sort((a, b) => b.score - a.score);
}

function finish() {
  document.getElementById("buttons").style.display = "none";
  document.getElementById("question").innerText = "あなたに合いそうな献立はこちら！";

  const top3 = calcScores().slice(0, 3);

  let html = "";
  top3.forEach(item => {
    html += `
      <div class="result-card">
        <h3>${item["メニュー名"]}</h3>
        <p>スコア：${Math.round(item.score)}</p>
        <a href="${item["Cookpadリンク"]}" target="_blank">レシピを見る</a>
      </div>
    `;
  });

  document.getElementById("result").innerHTML = html;

  // やり直しボタン表示
  document.getElementById("restart").style.display = "inline-block";
}

function restartGame() {
  index = 0;
  answers = [];
  questions = JSON.parse(JSON.stringify(originalQuestions));

  document.getElementById("buttons").style.display = "block";
  document.getElementById("restart").style.display = "none";
  document.getElementById("result").innerHTML = "";
  document.getElementById("bar-inner").style.width = "0%";

  showQuestion();
}
</script>

</body>
</html>
