<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>献立アキネーター</title>

<style>
body {
  font-family: "Hiragino Sans", "Rounded Mplus 1c", sans-serif;
  background: #FFF8F0;
  text-align: center;
  padding: 20px;
  margin: 0;
  color: #444;
}

h1 {
  color: #FF8FA3;
  margin-bottom: 10px;
}

.fav-top-btn {
  display: inline-block;
  background: #FF8FA3;
  color: white;
  padding: 12px 25px;
  border-radius: 25px;
  font-size: 16px;
  font-weight: bold;
  text-decoration: none;
  margin-bottom: 20px;
  box-shadow: 0 3px 6px rgba(0,0,0,0.15);
}

#question {
  font-size: 22px;
  margin: 30px 0;
  min-height: 80px;
}

.btn {
  padding: 14px 25px;
  margin: 8px;
  font-size: 18px;
  cursor: pointer;
  width: 90%;
  max-width: 300px;
  border-radius: 25px;
  border: none;
  background: #FFB6C1;
  color: white;
  box-shadow: 0 3px 6px rgba(0,0,0,0.15);
}

#buttons {
  display: flex;
  flex-direction: column;
  align-items: center;
}

#bar {
  width: 90%;
  height: 18px;
  background: #F2DCDC;
  margin: 20px auto;
  border-radius: 10px;
  overflow: hidden;
}

#bar-inner {
  height: 100%;
  width: 0%;
  background: #A7C7E7;
  transition: width 0.3s ease;
}

.result-card {
  background: white;
  border-radius: 15px;
  padding: 20px;
  margin: 15px auto;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.result-card h3 {
  margin-top: 0;
  color: #FF8FA3;
}

.save-btn {
  margin-top: 10px;
  padding: 10px 20px;
  background: #FF8FA3;
  color: white;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

#result {
  padding-bottom: 180px;
}

#restart {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 300px;
  padding: 14px;
  font-size: 18px;
  border-radius: 25px;
  background: #FF8FA3;
  color: white;
  cursor: pointer;
  border: none;
  box-shadow: 0 3px 6px rgba(0,0,0,0.2);
  z-index: 999;
}

@media (max-width: 480px) {
  #question { font-size: 20px; }
  .btn { font-size: 16px; padding: 12px; }
  #restart { font-size: 16px; padding: 12px; }
}
</style>
</head>
<body>

<h1>献立アキネーター</h1>

<a href="favorites.html" class="fav-top-btn">❤️ お気に入りを見る</a>

<div id="question"></div>

<div id="buttons">
  <button class="btn" onclick="answer(2)">はい</button>
  <button class="btn" onclick="answer(1)">ややそう</button>
  <button class="btn" onclick="answer(0)">どちらでもない</button>
  <button class="btn" onclick="answer(-1)">あまりそうでない</button>
  <button class="btn" onclick="answer(-2)">いいえ</button>
</div>

<div id="bar"><div id="bar-inner"></div></div>

<div id="result"></div>

<button id="restart" onclick="restartGame()">最初からやり直す</button>

<script>
// ===============================
// 質問セット（分岐タグ付き）
// ===============================
let questions = [
  // --- ジャンル ---
  { text: "和食がいい？", key: "ジャンル", value: "和", branchGroup: "genre" },
  { text: "洋食がいい？", key: "ジャンル", value: "洋", branchGroup: "genre" },
  { text: "中華がいい？", key: "ジャンル", value: "中", branchGroup: "genre" },
  { text: "韓国料理がいい？", key: "ジャンル", value: "韓", branchGroup: "genre" },
  { text: "エスニック料理がいい？", key: "ジャンル", value: "エスニック", branchGroup: "genre" },

  // --- 主食 ---
  { text: "ご飯ものがいい？", key: "主食", value: "米", branchGroup: "staple" },
  { text: "麺類がいい？", key: "主食", value: "麺", branchGroup: "staple" },
  { text: "パン系がいい？", key: "主食", value: "パン", branchGroup: "staple" },
  { text: "主食なしの料理がいい？", key: "主食", value: "なし", branchGroup: "staple" },

  // --- 味の傾向 ---
  { text: "こってりした料理がいい？", key: "味の傾向", value: "こってり", branchGroup: "rich" },
  { text: "あっさりした料理がいい？", key: "味の傾向", value: "あっさり", branchGroup: "rich" },
  { text: "味の濃さは普通がいい？", key: "味の傾向", value: "普通", branchGroup: "rich" },

  // --- 味の特徴 ---
  { text: "甘辛い味が好き？", key: "味の特徴", value: "甘辛" },
  { text: "醤油味が好き？", key: "味の特徴", value: "醤油味" },
  { text: "塩味が好き？", key: "味の特徴", value: "塩味" },
  { text: "味噌味が好き？", key: "味の特徴", value: "味噌味" },
  { text: "クリーミーな味が好き？", key: "味の特徴", value: "クリーミー" },

  // --- 辛さ（スパイシーと辛いはどちらか1つ） ---
  { text: "辛い料理が好き？", key: "味の特徴", value: "辛い", branchGroup: "spicy" },
  { text: "スパイシーな料理が好き？", key: "味の特徴", value: "スパイシー", branchGroup: "spicy" },

  // --- 季節 ---
  { text: "春に合う料理がいい？", key: "季節", value: "春", branchGroup: "season" },
  { text: "夏に合う料理がいい？", key: "季節", value: "夏", branchGroup: "season" },
  { text: "秋に合う料理がいい？", key: "季節", value: "秋", branchGroup: "season" },
  { text: "冬に合う料理がいい？", key: "季節", value: "冬", branchGroup: "season" },
  { text: "季節は気にしない？", key: "季節", value: "オール", branchGroup: "season" },

  // --- 調理時間 ---
  { text: "15分以内で作れる料理がいい？", key: "調理時間(分)", value: 15, type: "time" },

  // --- 予算 ---
  { text: "安めの料理がいい？", key: "予算帯", value: "低" },
  { text: "普通の予算でいい？", key: "予算帯", value: "中" },
  { text: "高めの料理でもいい？", key: "予算帯", value: "高" },

  // --- ボリューム ---
  { text: "軽めの料理がいい？", key: "ボリューム", value: "軽い" },
  { text: "普通くらいの量がいい？", key: "ボリューム", value: "普通" },
  { text: "しっかり食べたい？", key: "ボリューム", value: "重い" },

  // --- 時間帯 ---
  { text: "朝食向けの料理がいい？", key: "時間帯", value: "朝食", type: "array", branchGroup: "time" },
  { text: "昼食向けの料理がいい？", key: "時間帯", value: "昼食", type: "array", branchGroup: "time" },
  { text: "夕食向けの料理がいい？", key: "時間帯", value: "夕食", type: "array", branchGroup: "time" },
  { text: "夜食向けの料理がいい？", key: "時間帯", value: "夜食", type: "array", branchGroup: "time" }
];

const originalQuestions = JSON.parse(JSON.stringify(questions));

let db = [];
let index = 0;
let answers = [];

// ===============================
// JSON 読み込み
// ===============================
fetch("menu.json")
  .then(res => res.json())
  .then(data => {
    db = data;
    showQuestion();
  });

function showQuestion() {
  document.getElementById("question").innerText = questions[index].text;
  document.getElementById("bar-inner").style.width =
    ((index) / questions.length) * 100 + "%";
}

function answer(value) {
  const q = questions[index];

  // YES（2 or 1）のときだけブランチカット
  if (value > 0 && q.branchGroup) {
    questions = questions.filter((qq, i) =>
      i <= index || qq.branchGroup !== q.branchGroup
    );
  }

  answers.push({ q, value });
  index++;

  if (index >= questions.length) finish();
  else showQuestion();
}

function calcScores() {
  db.forEach(item => {
    item.score = 0;

    answers.forEach(a => {
      const q = a.q;

      if (q.type === "time") {
        if (a.value > 0 && item[q.key] <= q.value) item.score += a.value;
      }
      else if (q.type === "array") {
        if (item[q.key].includes(q.value)) item.score += a.value;
      }
      else if (q.key === "味の特徴") {
        if (item["味の特徴"].includes(q.value)) item.score += a.value;
      }
      else {
        if (item[q.key] === q.value) item.score += a.value;
      }
    });
  });

  return db.sort((a, b) => b.score - a.score);
}

function saveMenu(name, link) {
  let saved = JSON.parse(localStorage.getItem("savedMenus") || "[]");

  if (!saved.some(item => item.name === name)) {
    saved.push({ name: name, link: link });
    localStorage.setItem("savedMenus", JSON.stringify(saved));
  }

  alert("お気に入りに追加したよ！");
}

function finish() {
  document.getElementById("buttons").style.display = "none";
  document.getElementById("question").innerText = "あなたに合いそうな献立はこちら！";

  const sorted = calcScores();
  const top3 = sorted.slice(0, 3);

  let html = "";
  top3.forEach(item => {
    const link = `https://cookpad.com/jp/search/${encodeURIComponent(item["メニュー名"])}`;

    html += `
      <div class="result-card">
        <h3>${item["メニュー名"]}</h3>
        <a href="${link}" target="_blank">レシピを見る</a><br>
        <button class="save-btn" onclick="saveMenu('${item["メニュー名"]}', '${link}')">
          お気に入りに追加
        </button>
      </div>
    `;
  });

  document.getElementById("result").innerHTML = html;
}

function restartGame() {
  index = 0;
  answers = [];
  questions = JSON.parse(JSON.stringify(originalQuestions));

  document.getElementById("buttons").style.display = "flex";
  document.getElementById("result").innerHTML = "";
  document.getElementById("bar-inner").style.width = "0%";

  showQuestion();
}
</script>

</body>
</html>
